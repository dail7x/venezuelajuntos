name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Trigger Coolify deployment
        if: ${{ secrets.COOLIFY_WEBHOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}"
