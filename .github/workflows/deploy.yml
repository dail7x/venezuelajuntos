name: Deploy to Coolify

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Select Coolify app
        id: coolify
        run: |
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "app_uuid=${{ secrets.COOLIFY_STAGING_APP_UUID }}" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "app_uuid=${{ secrets.COOLIFY_PRODUCTION_APP_UUID }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Coolify deployment
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ steps.coolify.outputs.app_uuid }}
        run: |
          if [ -z "$COOLIFY_BASE_URL" ] || [ -z "$COOLIFY_TOKEN" ] || [ -z "$COOLIFY_APP_UUID" ]; then
            echo "Coolify deployment secrets are not fully configured."
            exit 1
          fi
          curl -fsS "$COOLIFY_BASE_URL/deploy?uuid=$COOLIFY_APP_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json"
          echo "Triggered Coolify ${{ steps.coolify.outputs.environment }} deployment."
